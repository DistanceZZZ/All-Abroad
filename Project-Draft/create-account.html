<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="author" content="Azita, Alex, Rayyan, Finley, Wenhua" />
    <link rel="icon" href="img/favicon.png" type="image/png" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/onboarding.css" />
    <title>Create Account</title>
  </head>
  <body class="form-page">
    <header>
      <div class="nav-bar">
        <a href="welcome-page.html"
          ><img
            class="icon all-abroad-icon"
            src="img/icons/all-abroad-icon.svg"
            alt="all abroad icon"
        /></a>
      </div>
    </header>
    <main class="form-page-main">
      <div class="form-content">
        <h1>Create Account</h1>
        <form>
          <label for="full-name">Full Name</label>
          <input
            type="text"
            id="full-name"
            class="textbox"
            placeholder="Full Name"
          />

          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            class="textbox"
            placeholder="Username"
          />

          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            class="textbox"
            placeholder="Password"
          />

          <label for="verify-password">Verify Password</label>
          <input
            type="password"
            id="verify-password"
            class="textbox"
            placeholder="Verify Password"
          />
          <a href="index.html" class="no-link-styling"
            ><div class="button onboard-button">Create Account</div></a
          >
        </form>
        <a href="login.html">Already have an account? Login</a>
      </div>
    </main>
    <footer>
      <p>&copy;All Abroad</p>
      <p>Email: <a href="mailto:azitab@uw.edu">azitab@uw.edu</a></p>
    </footer>
  </body>
</html>
