<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="author" content="Azita, Alex, Rayyan, Finley, Wenhua" />
    <link rel="icon" href="img/favicon.png" type="image/png" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/onboarding.css" />
    <title>Login</title>
  </head>
  <body class="form-page">
    <header>
      <div class="nav-bar">
        <a href="welcome-page.html"
          ><img
            class="icon all-abroad-icon"
            src="img/icons/all-abroad-icon.svg"
            alt="all abroad icon"
        /></a>
      </div>
    </header>
    <main class="form-page-main">
      <div class="form-content">
        <h1>Login</h1>
        <form>
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            class="textbox"
            placeholder="Username"
          />
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            class="textbox"
            placeholder="Password"
          />
          <a href="index.html" class="no-link-styling"
            ><div class="button onboard-button">Login</div></a
          >
        </form>
        <a href="create-account.html" class="create-account-link"
          >Don't have an account? Create Account</a
        >
      </div>
    </main>
    <footer>
      <p>&copy;All Abroad</p>
      <p>Email: <a href="mailto:azitab@uw.edu">azitab@uw.edu</a></p>
    </footer>
  </body>
</html>
