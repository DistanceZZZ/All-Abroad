<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/new-study-abroad.css" />
    <title>New-Study-Abroad</title>

  <body class="form-page">
    <header>
      <div class="nav-bar">
        <img
          class="icon all-abroad-icon"
          src="img/icons/all-abroad-icon.svg"
          alt="all abroad icon"
        />
      </div>
    </header>
    <main class="form-page-main">
      <div class="form-content">
        <h1 class="page-header-simple">Add Study Abroad</h1>
        <form>
          <label for="title"></label>
          <input type="text" id="title" placeholder="Title" />

          <div>
            <label for="cover-photo">Add Cover Photo</label><br />
            <input
              type="file"
              id="cover-photo"
              name="cover-photo"
              accept="image/*"
            />
          </div>

          <div class="button-container">
            <a href="index.html" class="button cancel-button no-link-styling"
              >Cancel</a
            >
            <a href="index.html" class="button save-button no-link-styling"
              >Save</a
            >
          </div>
        </form>
      </div>
    </main>
    <footer>
      <p>&copy; 2025 All Aboard</p>
      <p>email: <a href="mailto:azitab@uw.edu">azitab@uw.edu</a></p>
    </footer>
  </body>
